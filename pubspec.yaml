name: project_gimal
description: "Project Gimal Flutter Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 라우팅
  go_router: ^15.0.0

  # 상태 관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 네트워크
  dio: ^5.7.0

  # 로컬 저장소
  shared_preferences: ^2.3.3

  # 캘린더
  table_calendar: ^3.1.2

  # 환경변수
  flutter_dotenv: ^5.2.1

  # 유틸
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/fonts/
